<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PhantomGuard 2.0 | Secure Access</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-secondary-fixed-variant": "#00530e",
              "surface": "#121318",
              "on-surface": "#e3e1e9",
              "on-tertiary-container": "#b50027",
              "tertiary-container": "#ffc1c0",
              "surface-container": "#1e1f25",
              "outline": "#849396",
              "primary-fixed": "#9cf0ff",
              "background": "#121318",
              "on-tertiary-fixed-variant": "#92001e",
              "secondary-container": "#13ff43",
              "inverse-primary": "#006875",
              "on-secondary-fixed": "#002203",
              "error-container": "#93000a",
              "secondary-fixed-dim": "#00e639",
              "tertiary": "#ffe7e6",
              "surface-tint": "#00daf3",
              "inverse-on-surface": "#2f3036",
              "primary": "#c3f5ff",
              "surface-container-low": "#1a1b21",
              "tertiary-fixed-dim": "#ffb3b2",
              "on-error-container": "#ffdad6",
              "on-primary-fixed-variant": "#004f58",
              "on-secondary-container": "#007117",
              "outline-variant": "#3b494c",
              "on-background": "#e3e1e9",
              "primary-container": "#00e5ff",
              "tertiary-fixed": "#ffdad8",
              "secondary": "#ecffe3",
              "surface-bright": "#38393f",
              "on-error": "#690005",
              "secondary-fixed": "#72ff70",
              "inverse-surface": "#e3e1e9",
              "primary-fixed-dim": "#00daf3",
              "on-primary-container": "#00626e",
              "on-tertiary": "#680012",
              "error": "#ffb4ab",
              "surface-variant": "#34343a",
              "on-surface-variant": "#bac9cc",
              "on-primary-fixed": "#001f24",
              "surface-dim": "#121318",
              "surface-container-lowest": "#0d0e13",
              "on-tertiary-fixed": "#410008",
              "on-secondary": "#003907",
              "on-primary": "#00363d",
              "surface-container-highest": "#34343a",
              "surface-container-high": "#292a2f"
            },
            fontFamily: {
              "headline": ["Space Grotesk"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
      body {
        background-color: #121318;
        color: #e3e1e9;
        font-family: 'Inter', sans-serif;
      }
      .kinetic-void-bg {
        background: radial-gradient(circle at 50% 50%, #1e1f25 0%, #121318 100%);
        position: relative;
        overflow: hidden;
      }
      .kinetic-void-bg::before {
        content: "";
        position: absolute;
        width: 200%;
        height: 200%;
        top: -50%;
        left: -50%;
        background-image: 
          radial-gradient(circle at 20% 30%, rgba(195, 245, 255, 0.03) 0%, transparent 40%),
          radial-gradient(circle at 80% 70%, rgba(0, 229, 255, 0.02) 0%, transparent 40%);
        pointer-events: none;
      }
      .glass-card {
        background: rgba(30, 31, 37, 0.6);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
      }
      .scan-line {
        height: 2px;
        background: linear-gradient(90deg, transparent, #c3f5ff, transparent);
        opacity: 0.3;
      }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
      }
    </style>
</head>
<body class="kinetic-void-bg min-h-screen flex flex-col items-center justify-center p-6 selection:bg-primary-container selection:text-on-primary-container">
<!-- Brand Header -->
<header class="mb-12 text-center">
<div class="flex items-center justify-center gap-3 mb-2">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="shield_with_heart" style="font-variation-settings: 'FILL' 1;">shield_with_heart</span>
<h1 class="font-headline text-3xl font-bold tracking-tighter text-primary">PHANTOMGUARD 2.0</h1>
</div>
<p class="font-headline text-sm tracking-[0.3em] text-outline uppercase">Secure Access Terminal</p>
</header>
<!-- Main Login Canvas -->
<main class="w-full max-w-md relative">
<!-- Decorative Ambient Glow -->
<div class="absolute -inset-4 bg-primary/5 blur-3xl rounded-full pointer-events-none"></div>
<div class="glass-card border border-outline-variant/10 rounded-lg overflow-hidden relative shadow-2xl">
<!-- Secure Connection Status -->
<div class="bg-surface-container-high px-6 py-3 flex items-center justify-between">
<div class="flex items-center gap-2">
<span class="relative flex h-2 w-2">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-secondary-container opacity-75"></span>
<span class="relative inline-flex rounded-full h-2 w-2 bg-secondary-container"></span>
</span>
<span class="text-[10px] font-label font-medium uppercase tracking-widest text-secondary-container">Encrypted Path Active</span>
</div>
<span class="text-[10px] font-label text-outline uppercase tracking-widest">Node: 42_PROT</span>
</div>
<!-- Login Form -->
<div class="p-8 space-y-8">
<div class="space-y-6">
<!-- Username -->
<div class="space-y-2 group">
<label class="block text-[11px] font-label font-bold text-outline uppercase tracking-widest px-1">Identity Identifier</label>
<div class="relative">
<input class="w-full bg-surface-container-high border-0 border-b-2 border-outline-variant/30 text-on-surface placeholder:text-outline/40 py-3 px-4 focus:ring-0 focus:border-primary transition-all font-body text-sm" placeholder="UID-8829-X" type="text"/>
</div>
</div>
<!-- Password -->
<div class="space-y-2 group">
<label class="block text-[11px] font-label font-bold text-outline uppercase tracking-widest px-1">Access Protocol</label>
<div class="relative">
<input class="w-full bg-surface-container-high border-0 border-b-2 border-outline-variant/30 text-on-surface placeholder:text-outline/40 py-3 px-4 focus:ring-0 focus:border-primary transition-all font-body text-sm" placeholder="••••••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors">
<span class="material-symbols-outlined text-sm" data-icon="visibility">visibility</span>
</button>
</div>
</div>
</div>
<!-- Biometric Simulation Element -->
<div class="bg-surface-container-lowest/50 rounded p-4 border border-outline-variant/10 group cursor-pointer hover:bg-surface-container-high transition-all">
<div class="flex items-center gap-4">
<div class="relative w-12 h-12 flex items-center justify-center bg-surface-container rounded-sm border border-outline-variant/20 overflow-hidden">
<div class="scan-line absolute w-full top-1/2 -translate-y-1/2"></div>
<span class="material-symbols-outlined text-primary-container text-2xl" data-icon="fingerprint">fingerprint</span>
</div>
<div class="flex-1">
<p class="text-[11px] font-label font-bold text-on-surface uppercase tracking-wider">Biometric Auth</p>
<p class="text-[10px] font-label text-outline">Waiting for sensor touch...</p>
</div>
<div class="text-primary-container">
<span class="material-symbols-outlined" data-icon="sensors">sensors</span>
</div>
</div>
</div>
<!-- Action Button -->
<button class="w-full py-4 bg-primary text-on-primary font-headline font-bold text-sm tracking-[0.2em] rounded-md shadow-[0_0_20px_rgba(195,245,255,0.2)] hover:shadow-[0_0_30px_rgba(195,245,255,0.4)] hover:brightness-110 active:scale-[0.98] transition-all uppercase flex items-center justify-center gap-2">
                    Initialize Session
                    <span class="material-symbols-outlined text-sm" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
<!-- Footer Links -->
<div class="px-8 pb-8 flex flex-col sm:flex-row items-center justify-between gap-4">
<a class="text-[10px] font-label font-medium text-outline uppercase tracking-widest hover:text-primary transition-colors flex items-center gap-1" href="#">
<span class="material-symbols-outlined text-xs" data-icon="key">key</span>
                    Forgot Credentials
                </a>
<div class="h-1 w-1 bg-outline-variant rounded-full hidden sm:block"></div>
<a class="text-[10px] font-label font-medium text-primary uppercase tracking-widest hover:brightness-125 transition-all flex items-center gap-1" href="#">
                    Register Administrator
                    <span class="material-symbols-outlined text-xs" data-icon="person_add">person_add</span>
</a>
</div>
<!-- Decorative Scanning Bar (Bottom) -->
<div class="h-1 w-full bg-surface-container-highest overflow-hidden">
<div class="h-full bg-primary-container w-1/3 animate-[shimmer_3s_infinite]"></div>
</div>
</div>
</main>
<!-- System Metadata Footer -->
<footer class="mt-12 w-full max-w-4xl px-6 flex flex-wrap justify-center gap-x-12 gap-y-4 opacity-40">
<div class="flex items-center gap-2">
<span class="text-[10px] font-label text-outline uppercase tracking-widest">Global Status:</span>
<span class="text-[10px] font-label text-secondary-container font-bold uppercase tracking-widest">Nominal</span>
</div>
<div class="flex items-center gap-2">
<span class="text-[10px] font-label text-outline uppercase tracking-widest">Threat Level:</span>
<span class="text-[10px] font-label text-on-surface font-bold uppercase tracking-widest">Level 0 (Ghost)</span>
</div>
<div class="flex items-center gap-2">
<span class="text-[10px] font-label text-outline uppercase tracking-widest">Uptime:</span>
<span class="text-[10px] font-label text-on-surface font-bold uppercase tracking-widest">99.999%</span>
</div>
</footer>
<!-- Background Grid/Pattern Elements -->
<div class="fixed inset-0 pointer-events-none z-[-1] opacity-20">
<div class="absolute inset-0" style="background-image: linear-gradient(#3b494c 1px, transparent 1px), linear-gradient(90deg, #3b494c 1px, transparent 1px); background-size: 80px 80px;"></div>
</div>
<!-- Additional Kinetic Elements -->
<div class="fixed top-20 right-20 w-64 h-64 bg-primary/5 blur-[100px] rounded-full pointer-events-none"></div>
<div class="fixed bottom-20 left-20 w-80 h-80 bg-primary-container/5 blur-[120px] rounded-full pointer-events-none"></div>
<style>
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(300%); }
        }
    </style>
</body></html>
